---
kind: service.CodeCov
spec:
  # the tool should be tested by Omni integration tests
  enabled: false
---
kind: golang.Generate
spec:
  baseSpecPath: /api
  vtProtobufEnabled: true
  specs:
    - source: api/specs/specs.proto
      subdirectory: specs
---
kind: golang.Build
name: omni-infra-provider-proxmox
spec:
  outputs:
    linux-amd64:
      GOOS: linux
      GOARCH: amd64
    linux-arm64:
      GOOS: linux
      GOARCH: arm64
---
kind: common.Image
name: image-omni-infra-provider-proxmox
spec:
  extraEnvironment:
    PLATFORM: linux/amd64,linux/arm64
---
kind: common.GHWorkflow
spec:
  customRunnerGroup: large
---
kind: auto.CustomSteps
spec:
  steps:
    - name: run-integration-test
      toplevel: true
    - name: run-integration-test-ha
      toplevel: true
---
kind: custom.Step
name: run-integration-test
spec:
  sudoInCI: true
  makefile:
    enabled: true
    depends:
      - omni-infra-provider-proxmox
    script:
      - >-
        @hack/test/integration.sh
  ghaction:
    condition: on-pull-request
    enabled: true
    sops: true
    parallelJob:
      name: integration-test
      runnerGroup: large
      needsOverride: [default, lint, unit-tests]
    artifacts:
      enabled: true
      extraPaths:
        - "!_out/omni/"
      additional:
        - name: omni-logs
          always: true
          continueOnError: true
          paths:
            - "/tmp/proxmox-e2e/*.log"
---
kind: custom.Step
name: run-integration-test-ha
spec:
  sudoInCI: true
  makefile:
    enabled: true
    depends:
      - omni-infra-provider-proxmox
    script:
      - >-
        @hack/test/integration.sh
  ghaction:
    condition: on-pull-request
    enabled: true
    sops: true
    environment:
      WITH_HA_MODE: "true"
    parallelJob:
      name: integration-test-ha
      runnerGroup: large
      needsOverride: [default, lint, unit-tests]
    artifacts:
      enabled: true
      skipDefaultArtifacts: true
      additional:
        - name: omni-logs-ha
          always: true
          continueOnError: true
          paths:
            - "/tmp/proxmox-e2e/*.log"
---
